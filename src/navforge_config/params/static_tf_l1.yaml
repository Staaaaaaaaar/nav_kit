static_tf_publisher:
  ros__parameters:
    # Add only transforms not already published by the L1 driver/URDF.
    # Measure the real sensor mount before enabling an entry.
    # Format: "parent_frame child_frame x y z roll pitch yaw" (metres/radians)
    # transforms:
    #   - "base_link lidar_link 0.25 0.0 0.20 0.0 0.0 0.0"
    transforms:
      - "base_link livox_frame 0.23 0.0 0.21 0.0 0.0 0.0"
      - "livox_frame imu_link 0.011 0.02329 -0.04412 0.0 0.0 0.0"
