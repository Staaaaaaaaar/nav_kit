slam_toolbox:
  ros__parameters:
    mode: mapping
    scan_topic: /scan
    output_topic: /loc/slam
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Real-time and map resolution settings for outdoor operation.
    transform_publish_period: 0.02
    map_update_interval: 1.0
    resolution: 0.05
    min_laser_range: 0.20
    max_laser_range: 40.0
    minimum_time_interval: 0.05
    transform_timeout: 0.20
    tf_buffer_duration: 60.0
    scan_queue_size: 100
    throttle_scans: 1

    # Dense scan matching favours repeatability over maximum mapping speed.
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.03
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 30.0
    link_match_minimum_response_fine: 0.10
    link_scan_maximum_distance: 2.0

    # Loop closure is important for long outdoor trajectories.
    do_loop_closing: true
    loop_search_maximum_distance: 6.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    correlation_search_space_dimension: 0.50
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.10
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Ceres settings recommended for stable pose-graph optimization.
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    qos_overrides:
      /scan:
        subscription:
          reliability: best_effort
          history: keep_last
          depth: 100
