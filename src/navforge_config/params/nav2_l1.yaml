bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.30
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [precise_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0

    precise_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.10

    # MPPI supports the L1's forward, reverse, and lateral motion directly.
    # Keep these limits aligned with velocity_smoother's final output limits.
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.15
      vy_std: 0.12
      wz_std: 0.25
      vx_max: 0.40
      vx_min: -0.20
      vy_max: 0.20
      wz_max: 0.60
      iteration_count: 1
      prune_distance: 2.0
      transform_tolerance: 0.20
      temperature: 0.30
      gamma: 0.015
      motion_model: Omni
      visualize: false
      regenerate_noises: false
      reset_period: 1.0
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - TwirlingCritic
        - VelocityDeadbandCritic

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        collision_cost: 1000000.0
        near_goal_distance: 0.50
        consider_footprint: true
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.40
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 0.50
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.50
        offset_from_furthest: 20
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 5
        threshold_to_consider: 1.40
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.50
        max_angle_to_furthest: 1.0
        forward_preference: false
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        # Minimum non-zero commands accepted by the L1 hardware interface.
        deadband_velocities: [0.05, 0.10, 0.02]

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.20
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      footprint: "[[0.38, 0.23], [0.38, -0.23], [-0.38, -0.23], [-0.38, 0.23]]"
      footprint_padding: 0.03
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          inf_is_valid: true
          obstacle_min_range: 0.20
          obstacle_max_range: 12.0
          raytrace_min_range: 0.20
          raytrace_max_range: 15.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.70
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.30
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.38, 0.23], [0.38, -0.23], [-0.38, -0.23], [-0.38, 0.23]]"
      footprint_padding: 0.03
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          inf_is_valid: true
          obstacle_min_range: 0.20
          obstacle_max_range: 15.0
          raytrace_min_range: 0.20
          raytrace_max_range: 20.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.80
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]
    GridBased:
      # Humble plugin IDs use '/'; Smac 2D is cost-aware and holonomic.
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.10
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.30
        w_data: 0.20
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, assisted_teleop, wait]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.20
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.50
    min_rotational_vel: 0.10
    rotational_acc_lim: 0.80

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: true
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 30.0
    scale_velocities: true
    # OPEN_LOOP lets the internal ramp cross hardware deadbands instead of
    # restarting from a zero odometry measurement on every cycle.
    feedback: OPEN_LOOP
    max_velocity: [0.40, 0.20, 0.60]
    min_velocity: [-0.20, -0.20, -0.60]
    max_accel: [0.40, 0.40, 0.80]
    max_decel: [-0.60, -0.60, -1.20]
    odom_topic: /odom
    odom_duration: 0.20
    deadband_velocity: [0.05, 0.10, 0.02]
    velocity_timeout: 0.50
