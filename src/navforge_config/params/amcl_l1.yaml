amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan
    tf_broadcast: true
    transform_tolerance: 0.30

    # Holonomic odometry model for a quadruped capable of lateral motion.
    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.10
    alpha2: 0.10
    alpha3: 0.08
    alpha4: 0.08
    alpha5: 0.10

    # Accuracy-oriented particle filter settings for outdoor maps.
    min_particles: 1000
    max_particles: 5000
    pf_err: 0.02
    pf_z: 0.99
    resample_interval: 1
    update_min_d: 0.05
    update_min_a: 0.05
    save_pose_rate: 0.5
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    laser_model_type: likelihood_field
    max_beams: 120
    laser_min_range: 0.20
    laser_max_range: 40.0
    laser_likelihood_max_dist: 3.0
    sigma_hit: 0.15
    lambda_short: 0.10
    z_hit: 0.80
    z_rand: 0.20
    z_short: 0.0
    z_max: 0.0

    # Beam skipping improves robustness to people, vegetation, and other map changes.
    do_beamskip: true
    beam_skip_distance: 0.50
    beam_skip_threshold: 0.30
    beam_skip_error_threshold: 0.90

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 10.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
