pointcloud_to_laserscan:
  ros__parameters:
    # Raw Livox points are height-sliced only; tune this window for terrain and low obstacles.
    input_topic: /livox/lidar
    target_frame: base_link
    transform_tolerance: 0.05
    min_height: -0.15
    max_height: 1.50
    angle_min: -3.14159265
    angle_max: 3.14159265
    angle_increment: 0.00872665
    scan_time: 0.10
    range_min: 0.20
    range_max: 40.0
    use_inf: true
