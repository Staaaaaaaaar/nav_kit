slam_toolbox:
  ros__parameters:
    mode: mapping
    scan_topic: /scan
    output_topic: /loc/slam
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    transform_publish_period: 0.02
    map_update_interval: 0.5
    resolution: 0.05
    min_laser_range: 0.1
    max_laser_range: 30.0
    scan_queue_size: 50
    minimum_time_interval: 0.0
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.03
    throttle_scans: 1
    tf_buffer_duration: 30.0
    map_file_name: quadrover_indoor
    qos_overrides:
      /scan:
        subscription:
          reliability: best_effort
          history: keep_last
          depth: 50
