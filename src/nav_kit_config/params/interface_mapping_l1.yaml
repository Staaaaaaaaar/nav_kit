# L1 mapping consumes the LiDAR-inertial odometry published on /slam_odom.
# If that source already publishes odom->base_link, set publish_tf to none to avoid duplicates.
topic_relay_odom:
  ros__parameters:
    input_topic: /slam_odom
    msg_type: odometry
    output_topic: /odom
    parent_frame: odom
    child_frame: base_link
    publish_tf: odom_base

topic_relay_loc:
  ros__parameters:
    input_topic: /loc/slam
    msg_type: pose
    output_topic: /loc
    parent_frame: map
    child_frame: base_link
    publish_tf: none
