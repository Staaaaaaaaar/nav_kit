imu_integrator:
  ros__parameters:
    input_topic: /imu/data
    output_topic: /odom/imu
    odom_frame: odom
    base_frame: base_link
    two_d_mode: true

pointcloud_to_laserscan:
  ros__parameters:
    output_topic: /scan
    target_frame: base_link
    transform_tolerance: 0.01
    min_height: 0.1
    max_height: 0.5
    angle_min: -3.14159265
    angle_max: 3.14159265
    angle_increment: 0.00872665
    scan_time: 0.1
    range_min: 0.1
    range_max: 30.0
    use_inf: true
